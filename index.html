<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMA ZAMAN | Tech, Lifestyle & Motivation</title>

<meta name="description" content="Premium blog for Technology, Lifestyle, and Motivation by CMA Zaman.">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

:root{--primary:#3b82f6;}

body{
font-family:'Plus Jakarta Sans',sans-serif;
transition:background .3s,color .3s;
}

.dark{
background:#0f172a;
color:#f8fafc;
}

.glass{
background:rgba(255,255,255,.8);
backdrop-filter:blur(10px);
}

.dark .glass{
background:rgba(15,23,42,.8);
border-color:#1e293b;
}

.card-hover:hover{
transform:translateY(-5px);
transition:.3s;
}
</style>
</head>

<body class="bg-slate-50 text-slate-900">

<!-- NAV -->

<nav class="fixed w-full z-50 glass border-b border-slate-200">

<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="text-2xl font-bold tracking-tighter">
CMA <span class="text-blue-600">ZAMAN</span>
</div>

<div class="hidden md:flex space-x-8 font-medium">

<a href="#home">Home</a>
<a href="#blog">Blog</a>
<a href="media.html">Media</a>
<a href="#profile">Author</a>

</div>

<div class="flex items-center space-x-4">

<button id="darkToggle" class="p-2 rounded-full bg-slate-200 dark:bg-slate-800">
<i class="fas fa-moon"></i>
</button>

<a href="#contact" class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-semibold">
Contact
</a>

</div>
</div>
</nav>


<!-- HERO -->

<header id="home" class="pt-32 pb-20 px-6 text-center">

<div class="max-w-4xl mx-auto">

<h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tight">
Tech, Lifestyle & <span class="text-blue-600">Motivation</span>
</h1>

<p class="text-lg text-slate-600 dark:text-slate-400 mb-8">
Decoding the digital age and empowering your personal journey.
</p>

<div class="relative max-w-lg mx-auto">

<input id="blogSearch" type="text" placeholder="Search posts..."

class="w-full px-6 py-4 rounded-full border border-slate-200 dark:bg-slate-800 dark:border-slate-700">

<i class="fas fa-search absolute right-6 top-5 text-slate-400"></i>

</div>

</div>
</header>


<!-- BLOG -->

<section id="blog" class="py-20 px-6">

<div class="max-w-7xl mx-auto">

<h2 class="text-4xl font-bold mb-12">Latest Insights</h2>

<div id="postsContainer" class="grid md:grid-cols-3 gap-8">

<!-- POST -->

<article class="post-card tech card-hover bg-white rounded-2xl overflow-hidden shadow border">

<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80"

class="w-full h-48 object-cover">

<div class="p-6">

<span class="text-xs font-bold text-blue-600 uppercase">Technology</span>

<h3 class="text-xl font-bold mt-2 mb-3">AI in 2026: What's Next?</h3>

<div class="flex justify-between items-center border-t pt-4">

<button class="like-btn text-slate-400 hover:text-red-500">
<i class="far fa-heart mr-1"></i>124
</button>

<a href="post.html" class="text-blue-600 font-semibold text-sm">
Read More
</a>

</div>
</div>
</article>

</div>
</div>
</section>


<!-- CONTACT -->

<section id="contact" class="py-24 px-6">

<div class="max-w-5xl mx-auto">

<h2 class="text-4xl font-bold mb-8">Stay Connected</h2>

<form id="contactForm"
action="https://formspree.io/f/xvzwpqwj"
method="POST"
class="space-y-4">

<input type="text" name="name" placeholder="Name"
class="w-full px-5 py-3 rounded-xl border" required>

<input type="email" name="email" placeholder="Email"
class="w-full px-5 py-3 rounded-xl border" required>

<textarea name="message" rows="4"
placeholder="Your Message"
class="w-full px-5 py-3 rounded-xl border"
required></textarea>

<button class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">
Send Message
</button>

</form>

</div>
</section>


<footer class="py-12 border-t text-center">

<p class="text-slate-400">
© 2026 CMA ZAMAN. All rights reserved.
</p>

</footer>


<script>

const darkToggle=document.getElementById("darkToggle")

darkToggle.addEventListener("click",()=>{

document.documentElement.classList.toggle("dark")

})

const search=document.getElementById("blogSearch")

search.addEventListener("keyup",(e)=>{

const term=e.target.value.toLowerCase()

document.querySelectorAll(".post-card").forEach(post=>{

const title=post.querySelector("h3").innerText.toLowerCase()

post.style.display=title.includes(term)?"block":"none"

})

})

</script>

</body>
</html>
